<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2330"/>
      <stop offset="100%" stop-color="#12151d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#c79534"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c168"/>
      <stop offset="100%" stop-color="#a87820"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#2a313c" stroke-width="6"/>

  <!-- Clock face glow ring -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.4"/>

  <!-- Hour tick marks -->
  <g fill="url(#gold)" opacity="0.7">
    <!-- 12 -->  <rect x="249" y="82"  width="14" height="28" rx="4"/>
    <!-- 3  -->  <rect x="402" y="249" width="28" height="14" rx="4"/>
    <!-- 6  -->  <rect x="249" y="402" width="14" height="28" rx="4"/>
    <!-- 9  -->  <rect x="82"  y="249" width="28" height="14" rx="4"/>
    <!-- 1  -->  <rect x="325" y="100" width="10" height="22" rx="3" transform="rotate(30 330 111)"/>
    <!-- 2  -->  <rect x="383" y="153" width="10" height="22" rx="3" transform="rotate(60 393 164)"/>
    <!-- 4  -->  <rect x="383" y="325" width="10" height="22" rx="3" transform="rotate(120 393 336)"/>
    <!-- 5  -->  <rect x="325" y="383" width="10" height="22" rx="3" transform="rotate(150 335 394)"/>
    <!-- 7  -->  <rect x="153" y="383" width="10" height="22" rx="3" transform="rotate(210 163 394)"/>
    <!-- 8  -->  <rect x="95"  y="325" width="10" height="22" rx="3" transform="rotate(240 105 336)"/>
    <!-- 10 -->  <rect x="95"  y="153" width="10" height="22" rx="3" transform="rotate(300 105 164)"/>
    <!-- 11 -->  <rect x="153" y="100" width="10" height="22" rx="3" transform="rotate(330 163 111)"/>
  </g>

  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="256" y1="256" x2="184" y2="160"
        stroke="url(#gold)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Minute hand (pointing ~12, slightly right) -->
  <line x1="256" y1="256" x2="272" y2="100"
        stroke="url(#gold2)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="url(#gold)"/>
  <circle cx="256" cy="256" r="7"  fill="#12151d"/>

  <!-- "TT" letters at bottom -->
  <text x="256" y="388"
        font-family="'SF Pro Display','Segoe UI',Arial,sans-serif"
        font-size="72"
        font-weight="900"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="-4"
        filter="url(#glow)">TT</text>

</svg>
